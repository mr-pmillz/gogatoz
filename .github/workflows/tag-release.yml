name: Tag Release

# When a release/* or hotfix/* branch is merged into main, derive the semver
# from the branch name and push an annotated tag.  The tag push triggers the
# release.yml workflow (GoReleaser + GHCR + GitHub Release).
#
# Uses a GitHub App token so the tag-push event re-triggers other workflows
# (GITHUB_TOKEN-created events are intentionally ignored by Actions).
#
# Prerequisites:
#   - Repository secrets GOGATOZ_APP_CLIENT_ID and GOGATOZ_APP_PRIVATE_KEY for a
#     GitHub App with Contents: write permission on this repo.
#   - The App must be on the branch/tag protection bypass list so it can push
#     tags to protected branches.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

jobs:
  tag:
    name: Tag release on merge
    if: >-
      github.event.pull_request.merged == true &&
      (startsWith(github.event.pull_request.head.ref, 'release/') ||
       startsWith(github.event.pull_request.head.ref, 'hotfix/'))
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # ratchet:actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.GOGATOZ_APP_CLIENT_ID }}
          private-key: ${{ secrets.GOGATOZ_APP_PRIVATE_KEY }}

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Checkout main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # ratchet:actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Derive version and push tag
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          # Strip the release/ or hotfix/ prefix and an optional leading "v".
          VERSION="${HEAD_REF#release/}"
          VERSION="${VERSION#hotfix/}"
          VERSION="${VERSION#v}"
          TAG="v${VERSION}"

          # Validate semver (X.Y.Z with optional -prerelease / +build / .N suffix).
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$'; then
            echo "::error::Could not derive a semver tag from branch '$HEAD_REF' (parsed '$VERSION'). Use release/vX.Y.Z or hotfix/vX.Y.Z."
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::notice::Tag ${TAG} already exists; nothing to do."
            exit 0
          fi

          git config user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

          git tag -a "${TAG}" -m "Release ${TAG} (PR #${PR_NUMBER})"
          git push origin "${TAG}"
          echo "::notice::Pushed ${TAG}; release.yml will build and publish the release."
