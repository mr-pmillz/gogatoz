name: Release

# Runs when a v* tag is pushed: builds release binaries + a source archive,
# pushes multi-arch container images to GHCR, generates release notes with
# git-cliff, publishes a GitHub Release, and attests build provenance.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the GitHub Release
  packages: write # push images to ghcr.io
  attestations: write # write build-provenance attestations
  id-token: write # OIDC token for attestation signing

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          # Full history so goreleaser and git-cliff can diff between tags.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # On the first-ever release there is no prior tag to diff against, so
      # `git-cliff --latest` would emit empty notes. Use the full changelog for
      # the first tag and the latest-release section for every tag after that.
      - name: Resolve changelog scope
        id: cliff_args
        run: |
          if [ "$(git tag | wc -l)" -le 1 ]; then
            echo "value=-r ." >> "$GITHUB_OUTPUT"
          else
            echo "value=-r . --latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # ratchet:orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: ${{ steps.cliff_args.outputs.value }}
        env:
          OUTPUT: RELEASE_CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # ratchet:docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # ratchet:goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --release-notes RELEASE_CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

      # Attest provenance for the release archives/binaries (dist/checksums.txt)
      - name: Attest build provenance (archives)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # ratchet:actions/attest-build-provenance@v4
        with:
          subject-checksums: ./dist/checksums.txt

      # Attest provenance for the pushed container images (dist/digests.txt)
      - name: Attest build provenance (images)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # ratchet:actions/attest-build-provenance@v4
        with:
          subject-checksums: ./dist/digests.txt

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
