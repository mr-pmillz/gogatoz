name: CI

on:
  push:
    branches: [main, develop, 'release/**', 'hotfix/**']
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.golangci-lint.yml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.golangci-lint.yml'
      - '.github/workflows/ci.yml'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # ratchet:actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: |
          CGO_ENABLED=0 go build \
            -ldflags="-s -w" \
            -o ./bin/gogatoz \
            ./main.go

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # ratchet:actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # ratchet:golangci/golangci-lint-action@v9
        with:
          # version can be 'latest' or a pinned v2.x; this repo uses golangci-lint v2.
          version: latest
          args: --config ./.golangci-lint.yml --timeout=5m

  test:
    name: test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # ratchet:actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Add GOPATH bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@3cf14356a16c7931cfeacd7dfee585527618df3d # easter egg

      - name: Run unit tests with coverage
        run: |
          set -euo pipefail
          mkdir -p coverage
          gotestsum \
            --jsonfile coverage/gotest.json \
            --format pkgname \
            -- ./... -race -coverprofile=coverage/coverage.txt -covermode=atomic

      - name: Coverage summary
        run: |
          go tool cover -func=coverage/coverage.txt | tee coverage/coverage-summary.txt
          {
            echo "## Coverage Summary"
            echo ""
            echo '```'
            tail -n 1 coverage/coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate HTML coverage report
        run: go tool cover -html=coverage/coverage.txt -o coverage/coverage.html

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: |
            coverage/coverage.txt
            coverage/coverage.html
            coverage/coverage-summary.txt
            coverage/gotest.json
          if-no-files-found: error

      - name: Publish test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # ratchet:dorny/test-reporter@v3
        if: always()
        with:
          name: Go Tests
          path: coverage/gotest.json
          reporter: golang-json
          fail-on-error: false
