name: Changelog

# Maintains the committed CHANGELOG.md ON the release branch so it lands on
# `main` as part of the release-PR merge — NOT as a separate post-merge push.
#
# Why: the old flow (a `changelog` job in release.yml) regenerated CHANGELOG.md
# AFTER the tag and pushed `chore: update changelog` straight to `main`. That
# commit superseded the release-merge commit before ci.yml's coverage job
# finished uploading its baseline — and the code-coverage action rejects a
# baseline that is no longer the latest commit on the branch. The
# changelog-only commit then never re-ran coverage, so `main` ended up with NO
# stored baseline and PR coverage comparisons showed "not yet available".
#
# Folding the changelog into the release branch makes the release-merge commit
# `main`'s final post-release HEAD, so ci.yml's coverage job runs on it and the
# baseline is stored and never superseded.
#
# GoReleaser still owns the GitHub Release notes (release.yml feeds it
# RELEASE_CHANGELOG.md via `git-cliff --latest`); this workflow only maintains
# the in-repo CHANGELOG.md file.

on:
  push:
    branches:
      - 'release/v*'
      - 'hotfix/v*'

permissions:
  contents: write

jobs:
  changelog:
    name: Update CHANGELOG.md on release branch
    runs-on: ubuntu-latest
    if: >-
      github.event.head_commit.message != 'chore: update changelog'
    steps:
      - name: Checkout release branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive release version from branch name
        id: ver
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${BRANCH#release/}"
          VERSION="${VERSION#hotfix/}"
          VERSION="${VERSION#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Could not derive a semver tag from branch '$BRANCH' (parsed '$VERSION'). Use release/vX.Y.Z or hotfix/vX.Y.Z."
            exit 1
          fi
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # ratchet:actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.GOGATOZ_APP_ID }}
          private-key: ${{ secrets.GOGATOZ_APP_PRIVATE_KEY }}

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # ratchet:orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.ver.outputs.tag }} --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Commit CHANGELOG.md if changed
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if git diff --quiet -- CHANGELOG.md; then
            echo "::notice::CHANGELOG.md unchanged; nothing to commit."
            exit 0
          fi
          git add CHANGELOG.md
          git commit -m "chore: update changelog"
          git push origin "HEAD:${BRANCH}"
